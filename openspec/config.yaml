schema: spec-driven

context: |
  Tech stack: Python 3.13.5 (conda), Pandas 3.0.2, NumPy 2.3.3, Matplotlib 3.10.8, PyTorch 2.9.0, scikit-learn 1.8.0, Seaborn 0.13.2
  Language: Python 3.13.5（conda 环境 /home/daivy/miniconda3/bin/python）
  Testing: pytest（待配置）
  Formatting: black（待配置）
  Domain: 网络入侵检测系统（IDS），基于 NSL-KDD 数据集
  Dataset: NSL-KDD（125,973 训练 + 22,544 测试，41 特征，二分类/多分类）
  所有产出物必须用简体中文撰写。
  技术术语如 API、REST、MLP、CNN 保持英文原样。
  项目分工：A同学（数据方向）、B同学（模型方向）、C同学（对比分析）

rules:
  proposal:
    - 包含回滚方案
    - 说明为什么做、做什么、不做什么
    - 标注影响范围
  specs:
    - 使用 Given/When/Then 格式描述行为
    - 每个 spec.md 包含版本号和最后更新日期
    - 变更时使用 Delta Specs（ADDED/MODIFIED/REMOVED）
  design:
    - 复杂流程需包含序列图
    - 标注关键依赖关系
    - 包含备选方案对比
  tasks:
    - 每个任务可独立验证
    - 标注依赖关系
    - 包含验收标准
